# OMR 레이아웃
layout:
  num_questions: 40
  choices_per_question: 5   # 1~5번 선택지
  # 버블이 이미지에서 정렬된 순서: 위→아래, 왼쪽→오른쪽 기준으로 1번문항 1~5, 2번문항 1~5, ...

# 채점
scoring:
  points_per_question: 1    # 문항당 배점 (또는 문항별 배점 리스트로 확장 가능)

# 엑셀
excel:
  # 응시생 시트에서 사번 컬럼 이름 (엑셀 헤더와 일치시킬 것)
  id_column: "사번"
  # 점수를 넣을 컬럼 이름 (없으면 새로 만듦)
  score_column: "점수"
  # 시트 이름 (첫 시트 사용 시 null)
  sheet_name: null
